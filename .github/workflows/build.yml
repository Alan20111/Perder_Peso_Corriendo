name: Build executables

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build self-contained app image (jpackage)
        run: ./gradlew jpackage --no-daemon --stacktrace
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/jpackage/* -DestinationPath PerderPesoCorriendo-windows.zip

      - name: Package (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd build/jpackage
          zip -r ../../PerderPesoCorriendo-${{ matrix.label }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.label }}
          path: PerderPesoCorriendo-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Ejecutables (autocontenidos)
          body: |
            Apps autocontenidas generadas automaticamente por GitHub Actions.
            No requieren tener Java instalado.
            - Windows: descomprime y ejecuta PerderPesoCorriendo.exe
            - macOS: descomprime y abre PerderPesoCorriendo.app
            - Linux: descomprime y ejecuta bin/PerderPesoCorriendo
          files: artifacts/**/*.zip
